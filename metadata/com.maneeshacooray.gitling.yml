# This file by itself doesn't publish anything -- F-Droid only reads metadata from its own
# fdroiddata repo (gitlab.com/fdroid/fdroiddata). To actually get listed, copy this file to
# metadata/com.maneeshacooray.gitling.yml there and open a merge request. Keeping a copy here
# is just so the build recipe lives next to the source it describes.
#
# UpdateCheckMode is anchored to the 1.0.x scheme specifically (not a generic
# ^v\d+\.\d+\.\d+$) because this repo's history still contains the original upstream MGit
# project's old release tags (v1.3.0, v1.5.x, v1.6.x, v1.7.0, etc, reachable through shared
# commit history) -- a looser pattern would match those too and make F-Droid's checker think
# they're new Gitling releases.
